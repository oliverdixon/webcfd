<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <link href="shell.css" rel="stylesheet">
    <title>EchoMap</title>
</head>
<body>
<header>
    Input WAV file: <input id="wav-picker" type="file" accept=".wav,audio/wav">
</header>
<canvas id="canvas" tabindex="-1"></canvas>
<script type='text/javascript'>
    const canvas = document.getElementById("canvas");

    canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
    });

    let Module = {
        canvas,

        print: text => console.log(text),
        printErr: text => console.error(text),
        setStatus: text => {
            if (text)
                console.log(text);
        }
    };

    Module.onRuntimeInitialized = () => {
        document.getElementById("wav-picker").addEventListener("change",
            async event => {
                const file = event.target.files[0];

                if (!file) {
                    console.log("No file selected");
                    return;
                }

                try {
                    const bytes = new Uint8Array(await file.arrayBuffer());

                    try {
                        Module.FS.mkdir("/uploads");
                    } catch (_) {
                        // Directory already exists
                    }

                    const path = "/uploads/" + file.name;
                    Module.FS.writeFile(path, bytes);

                    const result = Module.ccall(
                        "echomap_on_wav_file_picked",
                        "number",
                        ["string"],
                        [path]
                    );

                    if (result !== 0)
                        console.error("C++ failed to load file:", path, "error code:", result);
                    else
                        console.log("Loaded file:", path);
                } catch (error) {
                    console.error("Failed to load selected file:", error);
                }
            }
        );
    };
</script>
{{{ SCRIPT }}}
</body>
</html>
